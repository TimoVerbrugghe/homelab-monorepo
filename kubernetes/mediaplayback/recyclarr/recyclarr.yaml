# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json

sonarr:
  web-2160p-v4:
    base_url: http://truenas.local.timo.be:14000
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    # Quality Profiles: https://recyclarr.dev/wiki/yaml/config-reference/quality-profiles/ 
    # Using my own defined quality profile (base template used from https://github.com/recyclarr/config-templates/blob/master/sonarr/includes/quality-profiles/sonarr-v4-quality-profile-web-2160p.yml)
    # Reason is because I want to include all qualities in the same profile (down to 720p)
    quality_profiles:
    - name: Ultra-HD
      reset_unmatched_scores:
        enabled: true
      upgrade:
        allowed: true
        until_quality: WEB 2160p
        until_score: 2500
      min_format_score: 10
      quality_sort: top
      qualities:
        - name: Bluray-2160p Remux
        - name: Bluray-2160p
        - name: WEB 2160p
          qualities:
            - WEBDL-2160p
            - WEBRip-2160p
        - name: HDTV-2160p
        - name: Bluray-1080p Remux
        - name: Bluray-1080p
        - name: WEB 1080p
          qualities:
            - WEBRip-1080p
            - WEBDL-1080p
        - name: HDTV-1080p
        - name: Bluray-720p
        - name: WEB 720p
          qualities:
            - WEBDL-720p
            - WEBRip-720p
        - name: HDTV-720p
        - name: Raw-HD

    # Custom Formats: https://recyclarr.dev/wiki/yaml/config-reference/custom-formats/
    custom_formats:
      # Cannot use the template sonarr-v4-custom-formats-web-2160p.yml that I commented out above because it also enables certain unwanted things (f.e. AV1) that I still want.
