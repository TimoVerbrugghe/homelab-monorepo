apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: recyclarr-config
    namespace: mediaplayback
    files:
      - recyclarr.yaml
    options:
      labels:
        app.kubernetes.io/name: recyclarr

secretGenerator:
  - name: recyclarr-secrets
    namespace: mediaplayback
    envs:
      - recyclarr-secrets.env
    type: Opaque
    options:
      labels:
        app.kubernetes.io/name: recyclarr

resources:
  - deployment.yaml
