# Apply all these resources with `kubectl apply -k .` from the directory containing this file
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

resources:
  - namespace.yaml
  - network-policies.yaml
  - discovery-relay
  - plex
  - jellyfin
  - themarr
  - tunarr
  - media-storage.yaml
  - kptv-fast
  - subgen
  - recyclarr