# NetworkPolicy for mediaplayback namespace.
# NOTE: Requires a NetworkPolicy-capable CNI (e.g. Cilium, Calico).
# Flannel alone does NOT enforce these policies.
---
# Default: deny all ingress.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: mediaplayback
spec:
  podSelector: {}
  policyTypes:
    - Ingress
---
# Allow ingress from Traefik (Plex, Jellyfin, ErsatzTV web UIs).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-traefik
  namespace: mediaplayback
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: traefik
---
# Allow ingress from Tailscale operator.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-tailscale
  namespace: mediaplayback
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tailscale
---
# Allow ingress from utilities namespace so Homepage and Gatus can reach
# media player endpoints for widgets and health checks.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-utilities
  namespace: mediaplayback
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: utilities
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: utilities-priv
---
# Allow intra-namespace traffic (e.g. subgen → Jellyfin, kptv → Plex).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: mediaplayback
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector: {}
