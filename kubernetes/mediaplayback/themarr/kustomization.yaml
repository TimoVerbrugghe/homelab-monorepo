# Apply all these resources with `kubectl apply -k .` from the directory containing this file
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generatorOptions:
  disableNameSuffixHash: true

secretGenerator:
  - name: themarr-secrets
    namespace: mediaplayback
    envs:
      - themarr-secrets.env
    type: Opaque
    options:
      labels:
        app.kubernetes.io/name: themarr

resources:
  - themarr.yaml
  - themarr-network.yaml
