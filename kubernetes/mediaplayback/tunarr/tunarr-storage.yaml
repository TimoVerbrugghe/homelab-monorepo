---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: tunarr-pv
  namespace: mediaplayback
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  iscsi:
    targetPortal: 10.10.10.2:3260
    iqn: iqn.2025-11.timo.be:tunarr
    lun: 0
    fsType: ext4
    readOnly: false
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tunarr-pvc
  namespace: mediaplayback
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  volumeName: tunarr-pv