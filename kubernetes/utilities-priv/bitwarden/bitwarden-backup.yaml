apiVersion: batch/v1
kind: CronJob
metadata:
  name: bitwarden-backup
  namespace: utilities-priv
spec:
  schedule: "0 2 * * *" # Runs daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 3000
            runAsGroup: 3000
            fsGroup: 3000
            seccompProfile:
              type: RuntimeDefault
          nodeSelector:
            kubernetes.io/hostname: yumi
          containers:
            - name: backup
              image: ghcr.io/timoverbrugghe/k8s-backup:latest
              imagePullPolicy: Always
              stdin: false
              tty: false
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              env:
                - name: BACKUP_NAME
                  value: "bitwarden"
              volumeMounts:
                - name: bitwarden-data
                  mountPath: /appdata
                - name: nfs-backup
                  mountPath: /backup
          volumes:
            - name: bitwarden-data
              hostPath:
                path: /var/mnt/bitwarden
                type: Directory
            - name: nfs-backup
              nfs:
                server: nfs.local.timo.be
                path: /mnt/FranzHopper/appdata/bitwarden