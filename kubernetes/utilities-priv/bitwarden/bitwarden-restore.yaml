apiVersion: batch/v1
kind: Job
metadata:
  name: bitwarden-restore
  namespace: utilities-priv
spec:
  template:
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 3000
        runAsGroup: 3000
        fsGroup: 3000
        seccompProfile:
          type: RuntimeDefault
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: yumi
      volumes:
        - name: bitwarden-data
          hostPath:
            path: /var/mnt/bitwarden
        - name: nfs-backup
          nfs:
            server: nfs.local.timo.be
            path: /mnt/FranzHopper/appdata/bitwarden
      containers:
        - name: restore
          image: ghcr.io/timoverbrugghe/k8s-restore:latest
          imagePullPolicy: Always
          stdin: false
          tty: false
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: bitwarden-data
              mountPath: /appdata
            - name: nfs-backup
              mountPath: /backup