apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: houndarr
  namespace: traefik
  annotations: 
    kubernetes.io/ingress.class: traefik
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`houndarr.kubernetes.timo.be`) || Host(`houndarr.timo.be`)
      kind: Rule
      services:
        - name: houndarr-svc
          port: 14012
      middlewares:
        - name: auth
          namespace: traefik
---
apiVersion: v1
kind: Service
metadata:
  name: houndarr-svc
  namespace: traefik
spec:
  clusterIP: None
  ports:
    - port: 14012
      targetPort: 14012
---
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: houndarr-svc-1
  namespace: traefik
  labels:
    kubernetes.io/service-name: houndarr-svc
addressType: IPv4
ports:
  - port: 14012
endpoints:
  - addresses:
      - "10.10.10.2"
    conditions:
      ready: true
