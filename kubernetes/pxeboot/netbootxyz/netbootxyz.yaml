apiVersion: apps/v1
kind: Deployment
metadata:
  name: netbootxyz
  namespace: pxeboot
  labels:
    app.kubernetes.io/name: netbootxyz
  annotations:
    keel.sh/policy: force
    keel.sh/trigger: poll
    keel.sh/pollSchedule: "@every 24h"
    keel.sh/match-tag: "true"
spec: 
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: netbootxyz
  template:
    metadata:
      labels:
        app.kubernetes.io/name: netbootxyz
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: netbootxyz
          image: ghcr.io/netbootxyz/netbootxyz:latest
          imagePullPolicy: Always
          stdin: false
          tty: false
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE", "SETUID", "SETGID", "NET_BIND_SERVICE", "NET_RAW"]
          env:
            - name: TFTPD_OPTS
              value: "--tftp-single-port"
          ports:
            - containerPort: 80
              protocol: TCP
              name: http
            - containerPort: 69
              protocol: UDP
              name: tftp
            - containerPort: 3000
              protocol: TCP
              name: webui
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          
          startupProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
            successThreshold: 1
          
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: config
              mountPath: /config
            - name: assets
              mountPath: /assets
            - name: winpe-assets
              mountPath: /assets/WinPE/x64
              readOnly: true
            # Injects local-vars.ipxe into the TFTP root so win_base_url is pre-set.
            - name: local-vars-ipxe
              mountPath: /config/local-vars.ipxe
              readOnly: true
              subPath: local-vars.ipxe
      volumes:
        - name: config
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
        - name: assets
          emptyDir:
            medium: Memory
            sizeLimit: 100Mi
        - name: local-vars-ipxe
          configMap:
            name: netbootxyz-local-vars-ipxe
        - name: winpe-assets
          persistentVolumeClaim:
            claimName: netbootxyz-winpe-pvc
            readOnly: true