apiVersion: v1
kind: Namespace
metadata:
  name: alpine
  # Using hostpath volumes requires privileged pod security
  # This is required for the portainer container to access the host filesystem for storing data in /var/mnt/portainer
  labels:
    pod-security.kubernetes.io/enforce: privileged
    pod-security.kubernetes.io/audit: privileged
    pod-security.kubernetes.io/warn: privileged
---
# Simple alpine container deployment used for debugging
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alpine-deployment
  namespace: alpine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alpine
  template:
    metadata:
      labels:
        app: alpine
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        kubernetes.io/hostname: yumi
      containers:
        - name: alpine
          image: alpine:latest
          stdin: false
          tty: false
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command: ["sleep", "3600"]
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          hostPath:
            path: /var/mnt/portainer
            type: Directory