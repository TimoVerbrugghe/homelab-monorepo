name: portainer-agent

x-hardening-defaults: &hardening-defaults
  security_opt:
    - no-new-privileges=true
  cap_drop:
    - ALL
  tty: false
  stdin_open: false
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  read_only: true

x-limits-medium: &limits-medium
  pids_limit: 512
  mem_limit: 1g
  cpus: 1.00

services:
  portainer-agent:
    <<: [*hardening-defaults, *limits-medium]
    container_name: portainer-agent
    image: portainer/agent:sts
    restart: always
    networks:
      - dockerproxy
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /mnt/.ix-apps/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"
  
networks:
  dockerproxy:
    name: dockerproxy
    external: false
    driver: bridge