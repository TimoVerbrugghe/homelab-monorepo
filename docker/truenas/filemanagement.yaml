x-hardening-defaults: &hardening-defaults
  security_opt:
    - no-new-privileges=true
  cap_drop:
    - ALL
  tty: false
  stdin_open: false
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"
  read_only: true

x-limits-medium: &limits-medium
  pids_limit: 512
  mem_limit: 1g
  cpus: 1.00

services:
  filezilla:
    <<: [*hardening-defaults, *limits-medium]
    image: lscr.io/linuxserver/filezilla:latest
    container_name: filezilla
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    restart: always
    networks:
      - dockerproxy
    environment:
      - TZ=Europe/Brussels
    volumes:
      - filezilla:/config
      - media:/media
      - isos:/isos
      - downloads:/downloads
    ports:
      - 13001:3000

  doublecommander:
    <<: [*hardening-defaults, *limits-medium]
    image: lscr.io/linuxserver/doublecommander:latest
    container_name: doublecommander
    cap_add:
      - CHOWN
      - FOWNER
      - DAC_OVERRIDE
      - SETUID
      - SETGID
    networks:
      - dockerproxy
    environment:
      - PUID=${PUID:-3000}
      - PGID=${PGID:-3000}
      - TZ=Etc/UTC
    volumes:
      - doublecommander:/config
      - media:/media
      - downloads:/downloads
      - isos:/isos
      - jeremy:/jeremy
    restart: always
    ports:
      - 13002:3000

volumes:
  filezilla:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/FranzHopper/appdata/filezilla"
  doublecommander:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/FranzHopper/appdata/doublecommander"
  media:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/X.A.N.A./media"
  isos:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/FranzHopper/isos"
  downloads:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/FranzHopper/downloads"
  jeremy:
    driver: local
    driver_opts:
      type: "none"
      o: "bind"
      device: "/mnt/Jeremy"

networks:
  dockerproxy:
    external: true

