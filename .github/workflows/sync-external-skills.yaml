name: Sync External Skills

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:

jobs:
  sync-external-skills:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Sync external skills
        run: |
          set -euo pipefail

          skills_dir=".github/skills"
          lock_file="${skills_dir}/EXTERNAL_SKILLS.lock"

          sources=(
            "portainer-mcp-hygiene|https://raw.githubusercontent.com/portainer/portainer-mcp/main/skills/portainer-mcp-hygiene/SKILL.md"
            "siderolabs|https://docs.siderolabs.com/skill.md"
          )

          mkdir -p "${skills_dir}"

          changed=0
          lock_tmp="$(mktemp)"

          {
            echo "# Auto-generated by .github/workflows/sync-external-skills.yaml"
            echo "# Do not edit manually."
            echo
            echo "sources:"
          } > "${lock_tmp}"

          for source in "${sources[@]}"; do
            name="${source%%|*}"
            url="${source#*|}"

            target_dir="${skills_dir}/${name}"
            target_file="${target_dir}/SKILL.md"

            mkdir -p "${target_dir}"

            tmp_file="$(mktemp)"
            curl -fsSL "${url}" -o "${tmp_file}"

            if [[ ! -f "${target_file}" ]] || ! cmp -s "${tmp_file}" "${target_file}"; then
              mv "${tmp_file}" "${target_file}"
              changed=1
              echo "Updated ${target_file}"
            else
              rm -f "${tmp_file}"
              echo "Unchanged ${target_file}"
            fi

            checksum="$(shasum -a 256 "${target_file}" | awk '{print $1}')"

            {
              echo "  - name: ${name}"
              echo "    url: ${url}"
              echo "    sha256: ${checksum}"
            } >> "${lock_tmp}"
          done

          if [[ ! -f "${lock_file}" ]] || ! cmp -s "${lock_tmp}" "${lock_file}"; then
            mv "${lock_tmp}" "${lock_file}"
            changed=1
            echo "Updated ${lock_file}"
          else
            rm -f "${lock_tmp}"
            echo "Unchanged ${lock_file}"
          fi

          if [[ "${changed}" -eq 1 ]]; then
            echo "External skill sync: changes detected."
          else
            echo "External skill sync: no changes detected."
          fi

      - name: Commit and push directly to main
        run: |
          if git diff --quiet; then
            echo "No external skill updates detected"
            exit 0
          fi

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .github/skills
          git commit -m "chore(skills): sync external skill definitions"
          git push origin HEAD:main
