name: Rotate Cluster Credentials

on:
  schedule:
    - cron: '0 9 1 */3 *'  # 09:00 UTC on the 1st of every 3rd month
  workflow_dispatch:        # allow manual trigger at any time

jobs:
  rotate-credentials:
    runs-on: ubuntu-latest

    env:
      ENDPOINT: 10.10.10.33
      WILLIAM: 10.10.10.30

    steps:
      - name: Setup Talos config
        run: |
          mkdir -p ~/.talos
          echo "${{ secrets.TALOSCONFIG }}" > ~/.talos/config
          chmod 600 ~/.talos/config

      - name: Install talosctl
        run: |
          curl -sL https://talos.dev/install | sh
          talosctl version --client

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:github-cicd

      - name: Verify existing talosconfig can reach cluster
        env:
          TALOSCONFIG: ~/.talos/config
        run: |
          talosctl version -n $WILLIAM -e $ENDPOINT

      - name: Generate fresh talosconfig
        env:
          TALOSCONFIG: ~/.talos/config
        run: |
          talosctl -n $WILLIAM -e $ENDPOINT config new ~/.talos/config.renewed --roles os:admin --crt-ttl 8760h
          echo "Verifying renewed talosconfig..."
          TALOSCONFIG=~/.talos/config.renewed talosctl version -n $WILLIAM -e $ENDPOINT

      - name: Generate fresh kubeconfig
        env:
          TALOSCONFIG: ~/.talos/config
        run: |
          mkdir -p ~/.kube
          talosctl kubeconfig ~/.kube/config.renewed -n $WILLIAM -e $ENDPOINT --force
          echo "Verifying renewed kubeconfig..."
          kubectl --kubeconfig ~/.kube/config.renewed get nodes

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ secrets.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Update TALOSCONFIG secret
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set TALOSCONFIG --repo "$GITHUB_REPOSITORY" < ~/.talos/config.renewed
          echo "Updated TALOSCONFIG secret"

      - name: Update KUBECONFIG secret
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh secret set KUBECONFIG --repo "$GITHUB_REPOSITORY" < ~/.kube/config.renewed
          echo "Updated KUBECONFIG secret"

      - name: Summary
        run: |
          echo "✅ TALOSCONFIG rotated (valid for 1 year)"
          echo "✅ KUBECONFIG rotated (valid for 1 year)"
          echo "Next scheduled rotation: in 3 months"
