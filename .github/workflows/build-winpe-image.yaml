name: Build WinPE Image

on:
  workflow_dispatch:
    inputs:
      arch:
        description: Windows architecture (passed to Fido -Arch)
        default: x64
        required: false
        type: string
      lang:
        description: >-
          Windows language (passed to Fido -Lang). Must be one of the exact language Names
          returned by Fido (e.g. "English", "English International", "German", "French", etc.).
          Use "English" for English (United States). Run Fido with -Lang List to see all options.
        default: English
        required: false
        type: string

concurrency:
  cancel-in-progress: true
  group: build-winpe-image

permissions:
  contents: read

jobs:
  build:
    name: Build WinPE ISO
    runs-on: windows-latest
    permissions:
      contents: read
    outputs:
      win11-download-url: ${{ steps.fido.outputs.url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Windows ADK
        shell: pwsh
        run: |
          Write-Output "Downloading Windows ADK..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2271337" -OutFile "$env:TEMP\adksetup.exe" -UseBasicParsing
          $ProgressPreference = 'Continue'

      - name: Install Windows ADK
        shell: pwsh
        run: |
          Write-Output "Installing Windows ADK Deployment Tools..."
          $process = Start-Process -FilePath "$env:TEMP\adksetup.exe" `
            -ArgumentList "/quiet", "/norestart", "/features", "OptionId.DeploymentTools" `
            -Wait -NoNewWindow -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Windows ADK installation failed with exit code $($process.ExitCode)"
          }
          Write-Output "Windows ADK installed."

      - name: Download Windows ADK WinPE addon
        shell: pwsh
        run: |
          Write-Output "Downloading Windows ADK WinPE addon..."
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/?linkid=2271338" -OutFile "$env:TEMP\adkwinpesetup.exe" -UseBasicParsing
          $ProgressPreference = 'Continue'

      - name: Install Windows ADK WinPE addon
        shell: pwsh
        run: |
          Write-Output "Installing Windows ADK WinPE addon..."
          $process = Start-Process -FilePath "$env:TEMP\adkwinpesetup.exe" `
            -ArgumentList "/quiet", "/norestart", "/features", "OptionId.WindowsPreinstallationEnvironment" `
            -Wait -NoNewWindow -PassThru
          if ($process.ExitCode -ne 0) {
            throw "Windows ADK WinPE addon installation failed with exit code $($process.ExitCode)"
          }
          Write-Output "Windows ADK WinPE addon installed."

      - name: Clean up existing WinPE state
        shell: pwsh
        run: |
          $mountfolder = "C:\WinPE_amd64\mount"
          Write-Output "Checking for existing mounted images..."
          if (Test-Path "$mountfolder\Users") {
            Write-Output "Found mounted image, dismounting..."
            Dismount-WindowsImage -Path $mountfolder -Discard
            Clear-WindowsCorruptMountPoint
          }
          if (Test-Path "C:\WinPE_amd64") {
            Write-Output "Removing existing WinPE folder..."
            Remove-Item -Recurse -Force "C:\WinPE_amd64"
          }

      - name: Create WinPE working directory
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\DandISetEnv.bat" && copype amd64 C:\WinPE_amd64

      - name: Mount boot image
        shell: pwsh
        run: |
          Write-Output "Mounting boot image..."
          Mount-WindowsImage -Path "C:\WinPE_amd64\mount" -ImagePath "C:\WinPE_amd64\media\sources\boot.wim" -Index 1

      - name: Add WinPE WMI and SecureStartup packages
        shell: pwsh
        run: |
          $mountfolder = "C:\WinPE_amd64\mount"
          $adk_winpe = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Windows Preinstallation Environment\amd64"
          Write-Output "Adding WinPE-WMI and WinPE-SecureStartup packages..."
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-WMI.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-WMI_en-us.cab" -Path $mountfolder -IgnoreCheck
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-SecureStartup.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-SecureStartup_en-us.cab" -Path $mountfolder -IgnoreCheck

      - name: Add WinPE HSP-Driver package
        shell: pwsh
        run: |
          $mountfolder = "C:\WinPE_amd64\mount"
          $adk_winpe = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Windows Preinstallation Environment\amd64"
          $hspDriverPath = "$adk_winpe\WinPE_OCs\WinPE-HSP-Driver.cab"
          if (Test-Path $hspDriverPath) {
            Write-Output "Adding WinPE-HSP-Driver package..."
            Add-WindowsPackage -PackagePath $hspDriverPath -Path $mountfolder
          } else {
            Write-Warning "WinPE-HSP-Driver.cab not found in this ADK version, skipping."
          }

      - name: Add WinPE PowerShell support packages
        shell: pwsh
        run: |
          $mountfolder = "C:\WinPE_amd64\mount"
          $adk_winpe = "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Windows Preinstallation Environment\amd64"
          Write-Output "Adding PowerShell support packages..."
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-NetFx.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-NetFx_en-us.cab" -Path $mountfolder -IgnoreCheck
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-Scripting.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-Scripting_en-us.cab" -Path $mountfolder -IgnoreCheck
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-PowerShell.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-PowerShell_en-us.cab" -Path $mountfolder -IgnoreCheck
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-DismCmdlets.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-DismCmdlets_en-us.cab" -Path $mountfolder -IgnoreCheck
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-StorageWMI.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-StorageWMI_en-us.cab" -Path $mountfolder -IgnoreCheck
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-EnhancedStorage.cab" -Path $mountfolder
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\en-us\WinPE-EnhancedStorage_en-us.cab" -Path $mountfolder -IgnoreCheck
          Add-WindowsPackage -PackagePath "$adk_winpe\WinPE_OCs\WinPE-SecureBootCmdlets.cab" -Path $mountfolder

      - name: Download virtio-win ISO
        shell: pwsh
        run: |
          Write-Output "Downloading virtio-win ISO..."
          curl.exe -fL -o C:\virtio-win.iso "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
          Write-Output "virtio-win ISO downloaded: $([math]::Round((Get-Item C:\virtio-win.iso).Length / 1MB, 1)) MB"

      - name: Inject virtio-win drivers into boot image
        shell: pwsh
        run: |
          $virtio_iso_path = "C:\virtio-win.iso"
          $mountfolder = "C:\WinPE_amd64\mount"
          Write-Output "Mounting virtio-win ISO..."
          $mountResult = Mount-DiskImage -ImagePath $virtio_iso_path -PassThru
          $driveLetter = ($mountResult | Get-Volume).DriveLetter
          $isoMountPath = "$($driveLetter):\"
          Write-Output "Adding virtio-win drivers to boot image..."
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\NetKVM\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\pvpanic\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\qemupciserial\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\qemufwcfg\w11\amd64" -Recurse
          # SMBus driver skipped - known installation issues
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\sriov\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\viofs\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\viogpudo\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\vioinput\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\viomem\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\viorng\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\vioscsi\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\vioserial\w11\amd64" -Recurse
          Add-WindowsDriver -Path $mountfolder -Driver "$isoMountPath\viostor\w11\amd64" -Recurse
          Write-Output "Dismounting virtio-win ISO..."
          Dismount-DiskImage -ImagePath $virtio_iso_path

      - name: Apply startnet.cmd to boot image
        shell: pwsh
        run: |
          Write-Output "Applying startnet.cmd..."
          Copy-Item -Path ".\windows\startnet.cmd" -Destination "C:\WinPE_amd64\mount\Windows\System32\startnet.cmd" -Force

      - name: Commit boot image changes
        shell: pwsh
        run: |
          Write-Output "Committing changes and dismounting boot image..."
          Dismount-WindowsImage -Path "C:\WinPE_amd64\mount" -Save -Verbose

      - name: Build WinPE ISO
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Windows Kits\10\Assessment and Deployment Kit\Deployment Tools\DandISetEnv.bat" && MakeWinPEMedia /ISO C:\WinPE_amd64 C:\WinPE_amd64\WinPE_amd64.iso

      - name: Get Windows 11 download URL via Fido
        id: fido
        shell: pwsh
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/pbatard/Fido/raw/master/Fido.ps1" -OutFile Fido.ps1 -UseBasicParsing
          Set-ExecutionPolicy -ExecutionPolicy Bypass -Scope Process -Force
          $fidoOutput = & .\Fido.ps1 -Arch "${{ inputs.arch }}" -Lang "${{ inputs.lang }}" -GetUrl 2>&1
          $url = ($fidoOutput | ForEach-Object { "$_" } | Where-Object { $_ -match '^https://' } | Select-Object -Last 1)
          if (-not $url -or $url -notmatch '^https://') {
            throw "Failed to get a valid Windows 11 download URL from Fido. Got: $($fidoOutput -join [Environment]::NewLine)"
          }
          Write-Output "Got Windows 11 download URL."
          "url=$url" >> $env:GITHUB_OUTPUT

      - name: Upload WinPE ISO as artifact
        uses: actions/upload-artifact@v7
        with:
          name: winpe-iso
          path: C:\WinPE_amd64\WinPE_amd64.iso
          retention-days: 7

  upload:
    name: Upload files to TheFactory
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read

    steps:
      - name: Download WinPE ISO artifact
        uses: actions/download-artifact@v8
        with:
          name: winpe-iso
          path: ./artifact

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s' "${{ secrets.THEFACTORY_SSH_PRIVATE_KEY_WINDOWSINSTALL }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_CLIENT_SECRET }}
          tags: tag:github-cicd

      - name: Add TheFactory to SSH known hosts
        env:
          THEFACTORY_HOST: ${{ secrets.THEFACTORY_TAILSCALE_HOSTNAME }}
        run: |
          ssh-keyscan "$THEFACTORY_HOST" >> ~/.ssh/known_hosts

      - name: Upload WinPE ISO to TheFactory
        env:
          THEFACTORY_HOST: ${{ secrets.THEFACTORY_TAILSCALE_HOSTNAME }}
          THEFACTORY_USER: ${{ secrets.THEFACTORY_SSH_USER_WINDOWSINSTALL }}
        run: |
          rsync -a --info=progress2 --whole-file \
            -e "ssh -T -o Compression=no" \
            ./artifact/WinPE_amd64.iso \
            "$THEFACTORY_USER@$THEFACTORY_HOST:/mnt/FranzHopper/windowsinstall/WinPE.iso"
          ssh "$THEFACTORY_USER@$THEFACTORY_HOST" \
            "chown windowsinstall:windowsinstall /mnt/FranzHopper/windowsinstall/WinPE.iso"

      - name: Download virtio-win ISO on TheFactory and extract
        env:
          THEFACTORY_HOST: ${{ secrets.THEFACTORY_TAILSCALE_HOSTNAME }}
          THEFACTORY_USER: ${{ secrets.THEFACTORY_SSH_USER_WINDOWSINSTALL }}
        run: |
          ssh "$THEFACTORY_USER@$THEFACTORY_HOST" 'bash -s' << 'ENDSSH'
          set -euo pipefail
          BASE=/mnt/FranzHopper/windowsinstall
          echo "Downloading virtio-win ISO..."
          curl -fL -o "$BASE/virtio-win.iso" \
            "https://fedorapeople.org/groups/virt/virtio-win/direct-downloads/stable-virtio/virtio-win.iso"
          echo "virtio-win ISO downloaded: $(du -h "$BASE/virtio-win.iso" | cut -f1)"
          if [ -d "$BASE/virtio-new" ]; then
            echo "Removing stale virtio-new/ from previous run..."
            chmod -R u+w "$BASE/virtio-new" 2>/dev/null || true
            rm -rf "$BASE/virtio-new"
          fi
          echo "Extracting virtio-win ISO to staging directory..."
          7z x "$BASE/virtio-win.iso" -o"$BASE/virtio-new/" -y
          echo "Extraction succeeded, swapping into place..."
          if [ -d "$BASE/virtio" ]; then
            chmod -R u+w "$BASE/virtio" 2>/dev/null || true
            rm -rf "$BASE/virtio"
          fi
          mv "$BASE/virtio-new" "$BASE/virtio"
          echo "virtio extraction complete."
          ENDSSH

      - name: Download Windows 11 ISO on TheFactory and extract
        env:
          THEFACTORY_HOST: ${{ secrets.THEFACTORY_TAILSCALE_HOSTNAME }}
          THEFACTORY_USER: ${{ secrets.THEFACTORY_SSH_USER_WINDOWSINSTALL }}
          WIN11_URL: ${{ needs.build.outputs.win11-download-url }}
        run: |
          set -euo pipefail
          if [ -z "$WIN11_URL" ]; then
            echo "ERROR: WIN11_URL is empty or unset" >&2
            exit 1
          fi
          # Base64-encode the URL so it is free of shell metacharacters (&, ?, %)
          # and can be safely passed as a positional argument through any remote shell.
          # The remote script decodes it before use.
          ENCODED_URL=$(printf '%s' "$WIN11_URL" | base64 | tr -d '\n')
          ssh "$THEFACTORY_USER@$THEFACTORY_HOST" bash -s -- "$ENCODED_URL" << 'ENDSSH'
          set -euo pipefail
          WIN11_URL=$(printf '%s' "$1" | base64 -d)
          BASE=/mnt/FranzHopper/windowsinstall
          echo "Downloading Windows 11 ISO..."
          curl -fL -o "$BASE/Windows11.iso" "$WIN11_URL"
          echo "Windows 11 ISO downloaded: $(du -h "$BASE/Windows11.iso" | cut -f1)"
          if [ -d "$BASE/Windows11-new" ]; then
            echo "Removing stale Windows11-new/ from previous run..."
            chmod -R u+w "$BASE/Windows11-new" 2>/dev/null || true
            rm -rf "$BASE/Windows11-new"
          fi
          echo "Extracting Windows 11 ISO to staging directory..."
          7z x "$BASE/Windows11.iso" -o"$BASE/Windows11-new/" -y
          echo "Extraction succeeded, swapping into place..."
          if [ -d "$BASE/Windows11" ]; then
            chmod -R u+w "$BASE/Windows11" 2>/dev/null || true
            rm -rf "$BASE/Windows11"
          fi
          mv "$BASE/Windows11-new" "$BASE/Windows11"
          echo "Windows 11 extraction complete."
          ENDSSH
